<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bench - Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons (via unpkg) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* slate-900 */
        }
    </style>
</head>
<body class="text-slate-100 flex h-screen items-center justify-center">

    <div class="text-center space-y-8">
        <div class="space-y-2">
            <h1 class="text-5xl font-bold tracking-tight bg-gradient-to-r from-blue-400 via-slate-200 to-amber-400 bg-clip-text text-transparent">
                The Bench
            </h1>
            <p class="text-slate-400 text-sm uppercase tracking-[0.2em]">Three Perspectives. One Truth.</p>
        </div>

        <!-- Auth Tabs -->
        <div class="max-w-sm mx-auto flex gap-2 mb-4 bg-slate-800/80 p-1 rounded-lg border border-slate-700/50 backdrop-blur-md">
            <button id="loginTab" onclick="switchTab('login')" class="flex-1 py-1.5 text-xs font-semibold rounded-md bg-blue-600 text-white transition-all duration-200">Login</button>
            <button id="signupTab" onclick="switchTab('signup')" class="flex-1 py-1.5 text-xs font-semibold rounded-md text-slate-400 hover:text-slate-200 transition-all duration-200">Register</button>
        </div>

        <form id="authForm" action="/login_submit" method="POST" class="max-w-sm mx-auto bg-slate-800/80 border border-slate-700/50 p-8 rounded-2xl space-y-5 shadow-2xl backdrop-blur-md">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div id="flashMessage" class="bg-red-500/20 border border-red-500 text-red-200 text-xs p-3 rounded-lg">
                  {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Username</label>
                <input type="text" name="username" required class="block w-full bg-slate-900/80 border border-slate-700/50 rounded-lg p-2.5 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Password</label>
                <input type="password" name="password" required class="block w-full bg-slate-900/80 border border-slate-700/50 rounded-lg p-2.5 text-slate-100 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none">
            </div>

            <!-- Role selector removed for standard user onboarding -->

            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold p-2.5 rounded-lg transition-all shadow-lg hover:shadow-blue-500/20">
                Authenticate
            </button>
        </form>

    <script>
        function switchTab(mode) {
            const form = document.getElementById('authForm');
            const roleSel = document.getElementById('roleSelector');
            const submitBtn = document.getElementById('submitBtn');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const flash = document.getElementById('flashMessage');
            if(flash) flash.classList.add('hidden');

            if (mode === 'signup') {
                form.action = "/register";
                roleSel.classList.remove('hidden');
                submitBtn.innerText = "Register Account";
                signupTab.className = "flex-1 py-1.5 text-xs font-semibold rounded-md bg-blue-600 text-white transition-all";
                loginTab.className = "flex-1 py-1.5 text-xs font-semibold rounded-md text-slate-400 hover:text-slate-200 transition-all";
            } else {
                form.action = "/login_submit";
                roleSel.classList.add('hidden');
                submitBtn.innerText = "Authenticate";
                loginTab.className = "flex-1 py-1.5 text-xs font-semibold rounded-md bg-blue-600 text-white transition-all";
                signupTab.className = "flex-1 py-1.5 text-xs font-semibold rounded-md text-slate-400 hover:text-slate-200 transition-all";
            }
        }
    </script>
</body>
</html>
